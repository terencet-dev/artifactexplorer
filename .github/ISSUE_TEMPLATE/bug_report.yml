name: Bug report
description: Report a defect, regression, or unexpected behavior.
title: "[bug] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below — it helps me reproduce and fix the issue much faster.

        **Security issues:** Please do NOT use this template for security vulnerabilities. See [SECURITY.md](../../SECURITY.md) for the private reporting flow.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences describing what's broken.
      placeholder: "e.g. Searching for an image with `@` in the tag returns a 500."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal, exact steps. Number them.
      placeholder: |
        1. Run `npm run dev`
        2. Navigate to `/registry/search`
        3. Type `foo@bar` and press Enter
        4. See server log: ...
      render: markdown
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include error messages and stack traces in code blocks.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / commit
      description: The release tag (e.g. `v1.0.3`) or commit SHA you're running.
      placeholder: "v1.0.3"
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment target
      options:
        - Local dev (npm run dev)
        - Vercel
        - Azure (Functions / App Service)
        - Self-hosted Node
        - Other / not sure
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "v20.10.0"

  - type: textarea
    id: env
    attributes:
      label: Relevant configuration
      description: Which env vars are set? (Do NOT paste secrets — variable NAMES only.)
      placeholder: |
        CRAWL_ENABLED=false
        DATABASE_URL=<set>
        NEXT_PUBLIC_SBOM_SEARCH_VISIBLE=true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, related issues, anything else.

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checks
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: I have NOT included passwords, tokens, or other secrets in this report.
          required: true
